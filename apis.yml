description: >-
  Welltower Inc. (NYSE: WELL) is an S&P 500 healthcare REIT that invests in
  senior housing, post-acute care, and outpatient medical properties across the
  United States, United Kingdom, and Canada. The company operates an internal
  operator portal at portaldev.welltower.com for property operators and
  partners. Welltower uses the Welltower Business System (WBS) and has
  integrated AI and data science capabilities including OpenAI. No public
  developer API has been identified; Welltower primarily uses internal
  proprietary systems for property management and operator coordination.
